<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(180deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
  color: #fff;
  width: 1080px;
  height: 1920px;
  overflow: hidden;
}
.container {
  padding: 80px 60px;
  height: 100%;
  display: flex;
  flex-direction: column;
}
.header {
  text-align: center;
  margin-bottom: 60px;
}
.title-icon {
  font-size: 80px;
  margin-bottom: 20px;
}
.title {
  font-size: 72px;
  font-weight: 700;
  background: linear-gradient(90deg, #58a6ff, #a371f7, #f778ba);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 20px;
}
.subtitle {
  font-size: 36px;
  color: #8b949e;
}
.cards {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 30px;
}
.card {
  background: linear-gradient(135deg, #21262d 0%, #161b22 100%);
  border: 2px solid #30363d;
  border-radius: 24px;
  padding: 32px 40px;
  display: flex;
  align-items: center;
  gap: 30px;
}
.card-icon {
  font-size: 56px;
  width: 100px;
  height: 100px;
  background: rgba(88, 166, 255, 0.1);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.card-content {
  flex: 1;
}
.card-title {
  font-size: 40px;
  font-weight: 600;
  color: #58a6ff;
  margin-bottom: 8px;
}
.card-desc {
  font-size: 28px;
  color: #8b949e;
}
.card-tag {
  font-size: 24px;
  color: #7ee787;
  background: rgba(126, 231, 135, 0.1);
  padding: 8px 20px;
  border-radius: 12px;
  flex-shrink: 0;
}
.footer {
  text-align: center;
  margin-top: 50px;
}
.footer-text {
  font-size: 28px;
  color: #8b949e;
  margin-bottom: 20px;
}
.footer-qr {
  font-size: 32px;
  color: #58a6ff;
}
.highlight {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(150px);
  opacity: 0.15;
}
.highlight-1 {
  background: #58a6ff;
  top: -100px;
  right: -100px;
}
.highlight-2 {
  background: #a371f7;
  bottom: 200px;
  left: -150px;
}
</style>
</head>
<body>
<div class="highlight highlight-1"></div>
<div class="highlight highlight-2"></div>
<div class="container">
  <div class="header">
    <div class="title-icon">🚀</div>
    <div class="title">Claude Code 状态栏神装</div>
    <div class="subtitle">5款必备插件 · 开发效率翻倍</div>
  </div>
  
  <div class="cards">
    <div class="card">
      <div class="card-icon">🎯</div>
      <div class="card-content">
        <div class="card-title">claude-hud</div>
        <div class="card-desc">全能监控 · Agent/Todo/工具全显示</div>
      </div>
      <div class="card-tag">推荐</div>
    </div>
    
    <div class="card">
      <div class="card-icon">💰</div>
      <div class="card-content">
        <div class="card-title">usage-bar</div>
        <div class="card-desc">预算管理 · Token燃烧率预测</div>
      </div>
      <div class="card-tag">省钱</div>
    </div>
    
    <div class="card">
      <div class="card-icon">🎨</div>
      <div class="card-content">
        <div class="card-title">ccstatusline</div>
        <div class="card-desc">颜值担当 · Powerline多主题</div>
      </div>
      <div class="card-tag">美观</div>
    </div>
    
    <div class="card">
      <div class="card-icon">⚡</div>
      <div class="card-content">
        <div class="card-title">claudia</div>
        <div class="card-desc">Rust高性能 · 云端同步</div>
      </div>
      <div class="card-tag">极速</div>
    </div>
    
    <div class="card">
      <div class="card-icon">📊</div>
      <div class="card-content">
        <div class="card-title">status_bar</div>
        <div class="card-desc">Web仪表盘 · 可视化最强</div>
      </div>
      <div class="card-tag">数据</div>
    </div>
  </div>
  
  <div class="footer">
    <div class="footer-text">一键安装 · 零配置 · 开箱即用</div>
    <div class="footer-qr">👇 扫码阅读完整教程</div>
  </div>
</div>
</body>
</html>
