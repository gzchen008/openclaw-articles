<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章标题</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.8;
      color: #333;
      max-width: 100%;
      padding: 20px;
    }
    h1 {
      font-size: 24px;
      font-weight: bold;
      margin: 20px 0;
      color: #000;
    }
    h2 {
      font-size: 20px;
      font-weight: bold;
      margin: 25px 0 15px;
      color: #000;
    }
    h3 {
      font-size: 18px;
      font-weight: bold;
      margin: 20px 0 10px;
      color: #000;
    }
    p {
      margin: 15px 0;
      text-align: justify;
    }
    blockquote {
      border-left: 4px solid #1aad19;
      padding: 10px 20px;
      margin: 20px 0;
      background-color: #f8f8f8;
      color: #666;
    }
    ul, ol {
      padding-left: 30px;
      margin: 15px 0;
    }
    li {
      margin: 8px 0;
    }
    code {
      background-color: #f5f5f5;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: Consolas, Monaco, monospace;
    }
    pre {
      background-color: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
      overflow-x: auto;
      margin: 15px 0;
    }
    pre code {
      padding: 0;
      background: none;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 20px auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #f5f5f5;
    }
    .highlight {
      background-color: #fffbe6;
      padding: 2px 4px;
    }
    .tip {
      background-color: #e6f7ff;
      border-left: 4px solid #1890ff;
      padding: 15px;
      margin: 20px 0;
    }
    .warning {
      background-color: #fff2e8;
      border-left: 4px solid #fa8c16;
      padding: 15px;
      margin: 20px 0;
    }
    .success {
      background-color: #f6ffed;
      border-left: 4px solid #52c41a;
      padding: 15px;
      margin: 20px 0;
    }
    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 30px 0;
    }
  </style>
</head>
<body>
  <!-- 文章内容从这里开始 -->
  
  <p>这是文章的开头段落...</p>
  
  <h2>第一个章节</h2>
  <p>章节内容...</p>
  
  <ul>
    <li>列表项 1</li>
    <li>列表项 2</li>
    <li>列表项 3</li>
  </ul>
  
  <blockquote>
    这是一段引用文字
  </blockquote>
  
  <div class="tip">
    💡 小提示：这是一个提示框
  </div>
  
  <h2>第二个章节</h2>
  <p>更多内容...</p>
  
  <!-- 文章内容到这里结束 -->
</body>
</html>
