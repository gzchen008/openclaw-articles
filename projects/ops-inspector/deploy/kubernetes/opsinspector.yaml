# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: opsinspector

---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: opsinspector-config
  namespace: opsinspector
data:
  config.yaml: |
    server:
      name: opsinspector-api
      host: 0.0.0.0
      port: 8080
      grpc_port: 9090
      metrics_port: 9091
      read_timeout: 30s
      write_timeout: 30s
      mode: release
    
    database:
      driver: mysql
      dsn: "root:opsinspector@tcp(mysql.default.svc.cluster.local:3306)/opsinspector?charset=utf8mb4&parseTime=True&loc=Local"
      max_open_conns: 25
      max_idle_conns: 5
      conn_max_lifetime: 1h
      conn_max_idle_time: 30m
    
    redis:
      addr: "redis:6379"
      password: ""
      db: 0
      pool_size: 10
    
    queue:
      driver: memory
      max_retries: 3
      retry_backoff: 5s
      visibility_timeout: 5m
    
    scheduler:
      enabled: true
      max_concurrent: 100
      check_interval: 10s
    
    worker:
      enabled: true
      concurrency: 10
      queues:
        - default
        - high
        - low
    
    notification:
      default_channels:
        - webhook
      dedup_window: 5m
      batch_size: 100
      batch_interval: 1s
    
    observability:
      metrics:
        enabled: true
        path: /metrics
      tracing:
        enabled: false
      logging:
        level: info
        format: json
    
    plugins:
      dir: /app/plugins
      auto_load: true

---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsinspector-api
  namespace: opsinspector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opsinspector-api
  template:
    metadata:
      labels:
        app: opsinspector-api
    spec:
      initContainers:
        - name: migrate
          image: opsinspector:latest
          command: ["/usr/local/bin/migrate"]
          env:
            - name: DATABASE_DSN
              value: "root:opsinspector@tcp(mysql.default.svc.cluster.local:3306)/opsinspector?charset=utf8mb4&parseTime=True&loc=Local"
          volumeMounts:
            - name: config
              mountPath: /app/configs
      containers:
        - name: api
          image: opsinspector:latest
          command: ["/usr/local/bin/api"]
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: grpc
            - containerPort: 9091
              name: metrics
          env:
            - name: DATABASE_DSN
              value: "root:opsinspector@tcp(mysql.default.svc.cluster.local:3306)/opsinspector?charset=utf8mb4&parseTime=True&loc=Local"
          volumeMounts:
            - name: config
              mountPath: /app/configs
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: opsinspector-config

---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: opsinspector-api
  namespace: opsinspector
spec:
  selector:
    app: opsinspector-api
  ports:
    - port: 8080
      targetPort: 8080
      name: http
    - port: 9090
      targetPort: 9090
      name: grpc
    - port: 9091
      targetPort: 9091
      name: metrics
  type: ClusterIP

---
# Scheduler Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsinspector-scheduler
  namespace: opsinspector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opsinspector-scheduler
  template:
    metadata:
      labels:
        app: opsinspector-scheduler
    spec:
      containers:
        - name: scheduler
          image: opsinspector:latest
          command: ["/usr/local/bin/scheduler"]
          env:
            - name: DATABASE_DSN
              value: "root:opsinspector@tcp(mysql.default.svc.cluster.local:3306)/opsinspector?charset=utf8mb4&parseTime=True&loc=Local"
          volumeMounts:
            - name: config
              mountPath: /app/configs
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: opsinspector-config

---
# Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsinspector-worker
  namespace: opsinspector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opsinspector-worker
  template:
    metadata:
      labels:
        app: opsinspector-worker
    spec:
      containers:
        - name: worker
          image: opsinspector:latest
          command: ["/usr/local/bin/worker"]
          env:
            - name: DATABASE_DSN
              value: "root:opsinspector@tcp(mysql.default.svc.cluster.local:3306)/opsinspector?charset=utf8mb4&parseTime=True&loc=Local"
          volumeMounts:
            - name: config
              mountPath: /app/configs
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: opsinspector-config
